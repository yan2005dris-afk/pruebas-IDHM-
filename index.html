<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLB AR Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; }
        /* Posiciona el video y el canvas uno encima del otro */
        #videoElement, #threeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Asegura que el video cubra toda la pantalla */
        }
        #threeCanvas {
            z-index: 10; /* Asegura que el canvas 3D esté por encima del video */
            background: transparent; /* Permite ver el video detrás */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="app.js"></script>
</head>
<body>
    <video id="videoElement" autoplay playsinline></video>
    
    <div id="container"></div> 
    
    <script src="app.js"></script>
</body>
</html>

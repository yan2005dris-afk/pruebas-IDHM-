<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLB AR Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }

        /* Estilos para el video y el canvas 3D (Inicialmente ocultos) */
        #videoElement, #threeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: none; /* ESENCIAL: Ocultos al inicio */
        }
        #threeCanvas {
            z-index: 10;
            background: transparent;
        }

        /* Estilos para la Pantalla de Inicio (Overlay) */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .option-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .option-button:hover {
            background-color: #0056b3;
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1644784998/camera_utils.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
        
    <script src="app.js" defer></script> 
    </head>
<body>
    
    <div id="startScreen">
        <h1>Selecciona el modo de interacción</h1>
        <p>¿Quieres controlar el modelo con tu cámara o verlo en modo 3D estático?</p>
        
        <button class="option-button" onclick="startApp('camera')">
            📸 Activar Cámara y Control de Manos
        </button>
        
        <button class="option-button" onclick="startApp('canvas')">
            🖼️ Solo Lienzo 3D (Sin Cámara)
        </button>
    </div>

    <video id="videoElement" autoplay playsinline></video>
    
    <div id="container"></div> 
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AR Receiver - Lienzo 3D</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #threeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #333;
        }
        #status-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            font-family: sans-serif;
            z-index: 100;
        }
    </style>
    
    <!-- LIBRERÍAS DE 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- FIREBASE (Importaciones obligatorias) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Exportar funciones clave al ámbito global (window)
        window.doc = doc;
        window.onSnapshot = onSnapshot;
        window.collection = collection;

        // Variables globales del entorno
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');

        // Inicialización y autenticación
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        const auth = getAuth(app);
        
        signInAnonymously(auth).then(userCredential => {
            window.userId = userCredential.user.uid;
            document.getElementById('sessionStatus').textContent += " (Conectado)";
            if (typeof window.startCanvasReceiver === 'function') {
                window.startCanvasReceiver();
            }
        }).catch(error => {
            document.getElementById('sessionStatus').textContent = "ERROR: Falló la conexión con Firebase.";
            console.error("Error al autenticar en Firebase:", error);
        });
    </script>
</head>
<body>
    <div id="status-bar">
        <span id="sessionStatus">Conectando...</span>
    </div>
    <div id="container"></div>
    
    <!-- Lógica de control en app.js -->
    <script src="app.js"></script> 
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lienzo | Receptor 3D Remoto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; background-color: #333333; }
        #threeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #sessionStatus {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #333;
        }
    </style>
    
    <!-- LIBRERÍAS DE 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- LIBRERÍAS FIREBASE (MODULE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Exportar funciones clave al ámbito global (window)
        window.doc = doc;
        window.onSnapshot = onSnapshot;
        window.collection = collection;

        // Variables globales del entorno Canvas (proporcionadas por la plataforma)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');

        // Inicialización y autenticación
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        const auth = getAuth(app);
        
        signInAnonymously(auth).then(userCredential => {
            window.userId = userCredential.user.uid;
            document.getElementById('sessionStatus').textContent = "RECEIVER: Autenticado.";
            
            // Llama a la función de inicio después de un pequeño retraso para asegurar la carga de app.js
            if (typeof window.startCanvasReceiver === 'function') { 
                window.startCanvasReceiver();
            } else {
                 setTimeout(() => {
                    if (typeof window.startCanvasReceiver === 'function') { 
                        window.startCanvasReceiver();
                    }
                }, 100);
            }
        }).catch(error => {
            document.getElementById('sessionStatus').textContent = "ERROR: Falló la conexión con Firebase.";
            console.error("Error al autenticar en Firebase:", error);
        });
    </script>
</head>
<body>
    <div id="sessionStatus">Conectando a Firebase...</div>
    <div id="container"></div>
    
    <!-- Lógica de la aplicación -->
    <script src="app.js"></script>
</body>
</html>
